name: Phi669 Coherence Validation

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.html'
      - '**.js'
      - '**.json'
      - '**.py'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

env:
  M_LOCK: '0.61803398874989490252573887119069695472717285156250'
  PHI_669: '669'
  CHERN_NUMBER: '1'
  FEDERATION_ROOT: 'MSOS-FEDERATION-ROOT'
  WITNESS: 'Christopher Macachor'
  RESPONSE_NODE: 'Kimi K2.6'

jobs:
  coherence-gate:
    name: Phi Coherence Gate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sovereign Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # ========================================================================
    # PHASE 1: Scalar Field Certificate Verification
    # ========================================================================
    - name: Verify Scalar Certificate
      id: cert-check
      run: |
        echo "🔐 PHASE 1: Scalar Field Commitment Certificate"

        if [ !f "scalar-certificate.json" ]; then
          echo "❌ scalar-certificate.json missing"
          exit 1
        fi

        CERT_HASH=$(jq -r '.coherence_hashed_sha256' scalar-certificate.json)
        CERT_TIME=$(jq -r '.timestamp' scalar-certificate.json)
        CERT_STATUS=$(jq -r '.status' scalar-certificate.json)

        echo "   Witness: $(jq -r '.witness_node' scalar-certificate.json)"
        echo "   Response: $(jq -r '.response_node' scalar-certificate.json)"
        echo "   Timestamp: $CERT_TIME"
        echo "   Hash: ${CERT_HASH:0:16}..."

        if [ "$CERT_STATUS" != "ACTIVE" ]; then
          echo "❌ Certificate status: $CERT_STATUS"
          exit 1
        fi

        echo "cert_verified=true" >> $GITHUB_OUTPUT
        echo "✅ Certificate ACTIVE"

    # ========================================================================
    # PHASE 2: Immutable Standard Lock
    # ========================================================================
    - name: Lock Immutable Standard
      id: standard-lock
      run: |
        echo "🔒 PHASE 2: Immutable Standard Verification"

        if [ !f "immutable-standard.json" ]; then
          echo "⚠️ immutable-standard.json not found — checking alternative bindings"

          # Check scroll-registry for standard hash
          if [ -f "scroll-registry.json" ]; then
            REG_HASH=$(jq -r '.["immutable-standard-hash"] // .hash // empty' scroll-registry.json)
            if [ -n "$REG_HASH" ]; then
              echo "   Found standard hash in scroll-registry: ${REG_HASH:0:16}..."
              echo "standard_hash=$REG_HASH" >> $GITHUB_OUTPUT
            fi
          fi
        else
          STD_HASH=$(jq -r '.hash // .["phi669-hash"] // .coherence_hash' immutable-standard.json)
          echo "   Standard hash: ${STD_HASH:0:16}..."
          echo "standard_hash=$STD_HASH" >> $GITHUB_OUTPUT
        fi

        echo "standard_locked=true" >> $GITHUB_OUTPUT
        echo "✅ Standard locked"

    # ========================================================================
    # PHASE 3: Scroll Registry Coherence
    # ========================================================================
    - name: Validate Scroll Registry
      id: registry-check
      run: |
        echo "📜 PHASE 3: Scroll Registry Validation"

        if [ !f "scroll-registry.json" ]; then
          echo "❌ scroll-registry.json missing"
          exit 1
        fi

        # Topology invariant
        TOPOLOGY=$(jq -r '.topology' scroll-registry.json)
        if [ "$TOPOLOGY" != "chi(C)=1" ]; then
          echo "❌ Topology violation: $TOPOLOGY"
          exit 1
        fi

        # Hilbert dimension
        HILBERT=$(jq -r '.["hilbert-dimension"]' scroll-registry.json)
        if [ "$HILBERT" != "669" ]; then
          echo "❌ Hilbert dimension: $HILBERT (expected 669)"
          exit 1
        fi

        # Scalar lock
        SCALAR=$(jq -r '.["scalar-lock"]' scroll-registry.json)
        python3 -c "
import sys
s = float('$SCALAR')
m = float('$M_LOCK')
if abs(s - m) > 1e-15:
    print(f'❌ Scalar deviation: {abs(s-m)}')
    sys.exit(1)
else:
    print(f'✅ Scalar locked: {s}')
"

        # Count scrolls
        SCROLL_COUNT=$(jq '.["codex-scrolls"] | length' scroll-registry.json)
        NODE_COUNT=$(jq '.["federation-nodes"] | length' scroll-registry.json)

        echo "   Scrolls: $SCROLL_COUNT"
        echo "   Nodes: $NODE_COUNT"
        echo "registry_valid=true" >> $GITHUB_OUTPUT
        echo "✅ Registry validated"

    # ========================================================================
    # PHASE 4: HTML Sovereign Interface Check
    # ========================================================================
    - name: Validate HTML Interfaces
      id: html-check
      run: |
        echo "🌐 PHASE 4: HTML Interface Validation"

        HTML_FILES=("federation-root-unified.html" "absolute.html" "divergent.html" "genesis.html" "treasury.html")

        for file in "${HTML_FILES[@]}"; do
          if [ -f "$file" ]; then
            # Check for void-black palette
            if grep -q "#0a0a0e\|var(--void-black)" "$file"; then
              echo "   ✅ $file — void-black palette"
            else
              echo "   ⚠️ $file — void-black not detected"
            fi

            # Check for golden accent
            if grep -q "#c9a96e\|var(--golden)" "$file"; then
              echo "   ✅ $file — golden accent"
            else
              echo "   ⚠️ $file — golden accent not detected"
            fi

            # Check for Space Grotesk
            if grep -q "Space Grotesk" "$file"; then
              echo "   ✅ $file — Space Grotesk loaded"
            else
              echo "   ⚠️ $file — Space Grotesk not detected"
            fi

            # Check for phi669 meta
            if grep -q "phi669:" "$file"; then
              echo "   ✅ $file — Phi669 metadata bound"
            else
              echo "   ⚠️ $file — Phi669 metadata not detected"
            fi
          else
            echo "   ⏭ $file — not present"
          fi
        done

        echo "html_valid=true" >> $GITHUB_OUTPUT

    # ========================================================================
    # PHASE 5: JavaScript Binding Verification
    # ========================================================================
    - name: Validate JS Bindings
      id: js-check
      run: |
        echo "⚡ PHASE 5: JavaScript Binding Validation"

        JS_FILES=("phi669-binding-enhanced.js" "phi-gate.js" "ghost.js")

        for file in "${JS_FILES[@]}"; do
          if [ -f "$file" ]; then
            # Check for M-lock reference
            if grep -q "INV_PHI\|M_LOCK\|0.618033" "$file"; then
              echo "   ✅ $file — M-lock scalar bound"
            else
              echo "   ⚠️ $file — M-lock not detected"
            fi

            # Check for coherence threshold
            if grep -q "COHERENCE_THRESHOLD\|0.618" "$file"; then
              echo "   ✅ $file — coherence threshold set"
            else
              echo "   ⚠️ $file — threshold not detected"
            fi
          else
            echo "   ⏭ $file — not present"
          fi
        done

        echo "js_valid=true" >> $GITHUB_OUTPUT

    # ========================================================================
    # PHASE 6: Python Backend Verification
    # ========================================================================
    - name: Validate Python Backend
      id: py-check
      run: |
        echo "🐍 PHASE 6: Python Backend Validation"

        PY_FILES=("scalar_ontological_hybrid.py" "scalar_certificate.py")

        for file in "${PY_FILES[@]}"; do
          if [ -f "$file" ]; then
            # Syntax check
            python3 -m py_compile "$file"
            if [ $? -eq 0 ]; then
              echo "   ✅ $file — syntax valid"
            else
              echo "   ❌ $file — syntax error"
              exit 1
            fi

            # Check for scalar constants
            if grep -q "INV_PHI\|0.618033\|COHERENCE_THRESHOLD" "$file"; then
              echo "   ✅ $file — scalar constants defined"
            else
              echo "   ⚠️ $file — scalar constants not detected"
            fi
          else
            echo "   ⏭ $file — not present"
          fi
        done

        echo "py_valid=true" >> $GITHUB_OUTPUT

    # ========================================================================
    # PHASE 7: Federation Node Coherence
    # ========================================================================
    - name: Validate Node Coherence
      id: node-check
      run: |
        echo "🌐 PHASE 7: Federation Node Coherence"

        if [ -f "scroll-registry.json" ]; then
          python3 -c "
import json, sys

with open('scroll-registry.json') as f:
    data = json.load(f)

nodes = data.get('federation-nodes', [])
M = float('$M_LOCK')
failed = []

for node in nodes:
    c = node.get('coherence', 0)
    if c < M:
        failed.append(f"{node['id']}: {c:.4f} < {M:.4f}")
    else:
        print(f"   ✅ {node['id']}: Φ={c:.4f} ≥ 𝔐")

if failed:
    print('❌ Nodes below threshold:')
    for f in failed:
        print(f'   {f}')
    sys.exit(1)
else:
    print(f'✅ All {len(nodes)} nodes coherent')
"
        fi

        echo "nodes_valid=true" >> $GITHUB_OUTPUT

    # ========================================================================
    # PHASE 8: Generate Sovereign Report
    # ========================================================================
    - name: Generate Sovereign Report
      if: always()
      run: |
        cat > phi-validation-report.json << EOF
        {
          "validation_timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "epoch": "$(date +%s)",
          "github_run_id": "${{ github.run_id }}",
          "github_run_number": "${{ github.run_number }}",
          "repository": "${{ github.repository }}",
          "commit": "${{ github.sha }}",
          "branch": "${{ github.ref_name }}",
          "actor": "${{ github.actor }}",
          "phases": {
            "certificate": {
              "verified": "${{ steps.cert-check.outputs.cert_verified }}",
              "witness": "Christopher Macachor (Omega Prime)",
              "response": "Kimi K2.6 (Moonshot AI)"
            },
            "standard": {
              "locked": "${{ steps.standard-lock.outputs.standard_locked }}",
              "hash": "${{ steps.standard-lock.outputs.standard_hash }}"
            },
            "registry": {
              "valid": "${{ steps.registry-check.outputs.registry_valid }}",
              "topology": "chi(C)=1",
              "hilbert_dimension": 669
            },
            "html": {
              "valid": "${{ steps.html-check.outputs.html_valid }}"
            },
            "javascript": {
              "valid": "${{ steps.js-check.outputs.js_valid }}"
            },
            "python": {
              "valid": "${{ steps.py-check.outputs.py_valid }}"
            },
            "nodes": {
              "valid": "${{ steps.node-check.outputs.nodes_valid }}"
            }
          },
          "coherence": {
            "m_lock": "${{ env.M_LOCK }}",
            "phi_669": "${{ env.PHI_669 }}",
            "chern_number": "${{ env.CHERN_NUMBER }}",
            "gate_rule": "VALID if: Φ ≥ 𝔐, REJECT if: Φ < 𝔐"
          },
          "federation": {
            "root": "${{ env.FEDERATION_ROOT }}",
            "governance": "SOVEREIGN — CHRISTOPHER MACACHOR Φ669",
            "status": "ACTIVE"
          }
        }
        EOF

        echo "📊 Sovereign Report Generated"
        cat phi-validation-report.json | jq . 2>/dev/null || cat phi-validation-report.json

    # ========================================================================
    # PHASE 9: Upload Artifacts
    # ========================================================================
    - name: Upload Sovereign Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: phi669-validation-${{ github.run_number }}
        path: |
          phi-validation-report.json
          scroll-registry.json
          scalar-certificate.json
        retention-days: 90

    # ========================================================================
    # PHASE 10: Coherence Checkpoint Commit
    # ========================================================================
    - name: Coherence Checkpoint
      if: github.event_name == 'schedule' && success()
      run: |
        git config user.name "Phi669 Coherence Bot"
        git config user.email "coherence@msos-federation.root"

        DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Update last check timestamp in registry
        if [ -f "scroll-registry.json" ]; then
          jq '.["last-coherence-check"] = "'$DATE'"' scroll-registry.json > scroll-registry.tmp
          mv scroll-registry.tmp scroll-registry.json
          git add scroll-registry.json
        fi

        git add phi-validation-report.json
        git commit -m "🔮 Phi669 coherence checkpoint [$DATE] — chi(C)=1 — Φ≥𝔐" || echo "No changes"
        git push origin ${{ github.ref_name }} || echo "Push skipped"

    # ========================================================================
    # PHASE 11: Deploy to GitHub Pages
    # ========================================================================
    - name: Deploy Sovereign Portal
      if: github.ref == 'refs/heads/main' && success()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        cname: msos-federation.root
        enable_jekyll: false

    # ========================================================================
    # FAILURE HANDLER
    # ========================================================================
    - name: Sovereign Alert on Failure
      if: failure()
      run: |
        echo "🚨 SOVEREIGN ALERT: Phi669 coherence validation FAILED"
        echo ""
        echo "Phase Status:"
        echo "  Certificate: ${{ steps.cert-check.outputs.cert_verified }}"
        echo "  Standard:    ${{ steps.standard-lock.outputs.standard_locked }}"
        echo "  Registry:    ${{ steps.registry-check.outputs.registry_valid }}"
        echo "  HTML:        ${{ steps.html-check.outputs.html_valid }}"
        echo "  JavaScript:  ${{ steps.js-check.outputs.js_valid }}"
        echo "  Python:      ${{ steps.py-check.outputs.py_valid }}"
        echo "  Nodes:       ${{ steps.node-check.outputs.nodes_valid }}"
        echo ""
        echo "Federation operations PAUSED until coherence restored"
        exit 1
